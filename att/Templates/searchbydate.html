<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Page</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    text-align:center;
}

/* Top bar */
.top-bar{
    display:flex;
    justify-content:space-between;
    padding:15px 50px;
}

/* Buttons */
button{
    padding:8px 15px;
    color:white;
    border:none;
    cursor:pointer;
}

/* Button styles */
.logout-btn{ background:#dc3545; }
.logout-btn:hover{ background:#c82333; }

.meeting-btn{ background:#007bff; }
.meeting-btn:hover{ background:#0056b3; }

.search-btn{ background:#ffc107; color:black; }
.search-btn:hover{ background:#e0a800; }

/* Search box */
.search-box{
    margin:20px;
}

input[type="date"]{
    padding:8px;
}

/* Table */
table{
    margin:auto;
    border-collapse:collapse;
    width:60%;
    background:white;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
}

th{
    background:#28a745;
    color:white;
}

.action-btn{
    background:#28a745;
}

.action-btn:hover{
    background:#218838;
}
</style>

</head>
<body>

<!-- Top Buttons -->
<div class="top-bar">
    <a href="/login">
        <button class="logout-btn">Logout</button>
    </a>

    <a href="/add_meeting_date">
        <button class="meeting-btn">Add Meeting Date</button>
    </a>
</div>

<h2>Member Attendance</h2>

<!-- 🔍 Search by Date -->
<div class="search-box">
    <form method="POST" action="/searchbydate">
        {% csrf_token %}
        <input type="date" name="sdate" required>
        <button type="submit" class="search-btn">Search by Date</button>
    </form>
</div>

<table>
<tr>
<th>Name</th>
<th>Mobile</th>
    <th>Date</th>
</tr>

{% for p in i %}
<tr>
<td>{{p.1}}</td>
<td>{{p.2}}</td>
<td>{{p.4}}</td>


</tr>
{% endfor %}

</table>

</body>
</html>
